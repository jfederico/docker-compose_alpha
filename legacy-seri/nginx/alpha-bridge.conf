# Temporary HTTP bridge for alpha -> current Seri.
#
# Mount this into the old home-proxy Nginx container under sites-enabled and
# expose only this listener to the LAN, for example 172.16.0.105:8080:8080.
# Alpha Caddy terminates public TLS; this bridge only preserves the current
# Host/path routing to containers on Seri's shared Docker network.

map $http_x_forwarded_proto $alpha_forwarded_proto {
    default $http_x_forwarded_proto;
    "" https;
}

map $http_cf_connecting_ip $alpha_client_ip {
    default $http_cf_connecting_ip;
    "" $remote_addr;
}

server {
    listen 8080;
    server_name glcpo.net;

    location / {
        set $upstream glcpo-nginx:80;
        proxy_pass http://$upstream;

        proxy_read_timeout 60s;
        proxy_redirect off;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $alpha_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie "$http_cookie; ip=$alpha_client_ip";
        proxy_set_header X-Forwarded-Proto $alpha_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 8080;
    server_name go.glcpo.net;

    location = /service-worker.js {
        set $upstream glcpo-nginx:80;
        proxy_pass http://$upstream;

        proxy_read_timeout 60s;
        proxy_redirect off;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $alpha_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $alpha_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /speakers {
        return 302 https://sites.google.com/view/glcpoomasoniceducationspeakers;
    }

    location = /speakers/ {
        return 302 https://sites.google.com/view/glcpoomasoniceducationspeakers;
    }

    location ^~ /rest/ {
        set $upstream glcpo-nginx:80;
        proxy_pass http://$upstream;

        proxy_read_timeout 60s;
        proxy_redirect off;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $alpha_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $alpha_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ~ ^/(?!rest/|settings(?:/|$)|manage-servers(?:/|$)|server(?:/|$))[A-Za-z0-9_-]+$ {
        set $upstream glcpo-nginx:80;
        proxy_pass http://$upstream;

        proxy_read_timeout 60s;
        proxy_redirect off;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $alpha_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $alpha_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ~ ^/(?!rest/|settings(?:/|$)|manage-servers(?:/|$)|server(?:/|$))([A-Za-z0-9_-]+)/$ {
        return 301 https://$host/$1$is_args$args;
    }

    location = /server {
        return 301 /server/;
    }

    location = /server/glcpo-go.glcpo.net {
        return 302 https://dashboard-go.glcpo.net$request_uri;
    }

    location ^~ /server/glcpo-go.glcpo.net/ {
        return 302 https://dashboard-go.glcpo.net$request_uri;
    }

    location ^~ /server/ {
        return 404;
    }

    location / {
        set $upstream glcpo-nginx:80;
        proxy_pass http://$upstream;

        proxy_read_timeout 60s;
        proxy_redirect off;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $alpha_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $alpha_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

