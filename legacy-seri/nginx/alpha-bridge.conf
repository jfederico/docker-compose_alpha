server {
    listen 8080;
    server_name knx1.com;

    location /apps/rooms {
        set $upstream knx1-rooms:3000;
        proxy_pass http://$upstream;

        proxy_read_timeout 60s;
        proxy_redirect off;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $alpha_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $alpha_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /lti {
        set $upstream knx1-broker:3000;
        proxy_pass http://$upstream;

        proxy_read_timeout 60s;
        proxy_redirect off;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $alpha_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $alpha_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /moodle {
        return 301 /moodle/;
    }

    location /moodle/ {
        set $upstream knx1-moodle:80;
        proxy_pass http://$upstream;

        proxy_read_timeout 60s;
        proxy_redirect off;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto $alpha_forwarded_proto;
        proxy_set_header X-Forwarded-Prefix /moodle;
        proxy_set_header X-Forwarded-Uri $request_uri;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header HTTPS on;
        proxy_set_header X-Real-IP $alpha_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        set $upstream knx1-wordpress:80;
        proxy_pass http://$upstream;

        proxy_read_timeout 60s;
        proxy_redirect off;
        proxy_http_version 1.1;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $alpha_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie "$http_cookie; ip=$alpha_client_ip";
        proxy_set_header X-Forwarded-Proto $alpha_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

